param_names:
    SIM_c
    SIM_RV
    SIM_beta
    SIM_x1
    SIM_EBV
    STEP
    SCATTER

parameters_to_condition_on:
    ['c', 'mB', 'x1', 'zHD', 'cERR', 'mBERR', 'x1ERR', 'MU', 'HOST_LOGMASS', 'MURES']

sim_parameters:
    n_sim:   100_000 
    n_batch: 500
    simname: 'simulations/sims.v5.LBN.h5'
    posteriorname: 'posteriors/posterior.v5.LBN.pt'

#Optional key; for use with run_nre.py. Otherwise leave as None
Models_Comparison:
    STJARNA.yml


Data_File:
    "DES5YR.FITRES.gz"
Simbank_File:
    "SIMBANK_THIRD.FITRES"


Population_B:
    Priors:
      SIM_c:       ['(-.1, 0.1)', '(0.02, 0.1)']
      SIM_RV:      ['(1.5,5)', '(0.5,1.5)']
      SIM_beta:    ['(1.5,3)', '(0.05, 0.3)']
      SIM_x1:      ['(-2,0)', '(0.2, 1.2)']
      SIM_EBV:     ['(0.05, .3)','(1,7)']
      STEP:        ['(-0.2,0.2)']
      SCATTER:     ['(0,0.1)']
#    # Parameters listed here share a single value across both populations
#    # (pop B uses pop A's value). Any param not listed gets independent pop B values
#    # drawn from the Priors above. Omit or leave empty for fully-split mixture.
    shared_params: [SIM_RV, SIM_EBV, SIM_beta]
    mixing_prior:   '(0, 1)'

Splits:
    STEP:    ["Stepwise", "HOST_LOGMASS", 10]


#########################
# Dictionaries 
#########################

Functions:
    SIM_c:    DistGaussian  #The shape of this parameter.
    SIM_RV:   DistGaussian
    SIM_EBV:  DistExponential
    SIM_beta: DistGaussian
    SIM_x1:   DistGaussian

#If using higher-order functions such as DistLogistic, which require two parameters
#this dictionary tells the correlation parameter.
#ONLY works when/if calling 2-parameter functions. 
Correlations:
    SIM_c:    None
    SIM_RV:   None
    SIM_EBV:  None
    SIM_beta: None
    SIM_x1:   None

# We assume BoxUniform priors for our parameters; 
# so each tuple needs to include the lower and upper bound you expect for that parameter. 
# Gaussians are formatted as mu then sigma

Priors:
    SIM_c:       ['(-.1, 0.1)', '(0.02, 0.1)']
    SIM_RV:      ['(1.5,5)', '(0.5,1.5)']
    SIM_beta:    ['(1.5,3)', '(0.05, 0.3)']
    SIM_x1:      ['(0,2)', '(0.2, 1.2)']
    SIM_EBV:     ['(0.05, .3)','(1,7)']
    STEP:        ['(-0.2,0.2)']
    SCATTER:     ['(0,0.1)']



# Fancy latex labels for plotting. Add as you see fit. 
Latex_Names:
    DistExponential:   ['$\tau$']
    DistGaussian:      ['$\mu$', '$\sigma$']
    DistGaussian_EVOL: ['$\mu$', '$\sigma$', '$\mu slope$']
    SIM_c:             '$c_{int}$'
    SIM_beta:          '$\beta_{int}$'
    SIM_RV:            '$R_V$'
    SIM_EBV:           '$EBV$'
    SIM_x1:            '$x_1$'
    STEP:              '$\gamma$'
    SCATTER:           '$\sigma_{int}$'
    DistLogistic:      ['$L$', '$k$', '$\sigma$']
    DistGamma:         ['$\tau$', '$\gamma$']